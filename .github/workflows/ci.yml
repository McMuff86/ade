name: CI

on:
  push:
    branches: [main, 'agent/**']
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux-contracts:
    name: Verify Linux contracts
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CI: '1'
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install native build prerequisites
        run: sudo apt-get update && sudo apt-get install -y python3 make g++

      - name: Install pnpm
        uses: pnpm/action-setup@v4.4.0
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install Linux-native dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Run focused checks
        run: pnpm test

      - name: Build production app
        run: pnpm run build

      - name: Build unpacked Linux package
        run: pnpm exec electron-builder --linux --x64 --dir --publish never

      - name: Install Electron runtime dependencies
        run: pnpm exec playwright install-deps

      - name: Run source Electron workflow under Xvfb
        run: xvfb-run --auto-servernum pnpm exec tsx scripts/test-electron-workflow.ts

      - name: Run workflow against packaged Linux executable
        env:
          ADE_E2E_EXECUTABLE: ${{ github.workspace }}/dist/linux-unpacked/ade
        run: xvfb-run --auto-servernum pnpm exec tsx scripts/test-electron-workflow.ts

  terminal-beta:
    name: Verify Windows terminal beta
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      CI: '1'
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4.4.0
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Run focused checks
        run: pnpm test

      - name: Build production app
        run: pnpm run build

      - name: Run Electron workflow
        run: pnpm exec tsx scripts/test-electron-workflow.ts

      - name: Validate unpacked Windows package
        run: pnpm exec electron-builder --win --x64 --dir

      - name: Run workflow against packaged executable
        run: |
          $env:ADE_E2E_EXECUTABLE = (Resolve-Path 'dist\win-unpacked\ADE.exe').Path
          pnpm exec tsx scripts/test-electron-workflow.ts

      - name: Upload Electron failure evidence
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: electron-workflow-failure
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7
