<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ADE · Orchestration Graph</title>
<style>
  /* ---- tokens (verbatim aus src/renderer/theme/tokens.css, dark) ---- */
  :root{
    --bg:#0E0F12; --panel:#15171C; --raised:#1B1E24; --line:#262A31;
    --text:#D7DBE1; --muted:#7C838E; --faint:#4A505A;
    --accent:#E09A4A; --accent-dim:#8A6132; --accent-contrast:#14161A;
    --add:#4EC98A; --del:#E0645C; --run:#4EC98A;
    --mono:"Cascadia Code","JetBrains Mono","SFMono-Regular",Consolas,ui-monospace,monospace;
    --sans:"Segoe UI",system-ui,-apple-system,sans-serif;
    --cable:#4EC98A;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:
      radial-gradient(1200px 700px at 70% -10%, #191b21 0%, transparent 60%),
      radial-gradient(900px 600px at 10% 110%, #14161b 0%, transparent 55%),
      var(--bg);
    color:var(--text); font-family:var(--mono); font-size:13px; line-height:1.5;
    overflow:hidden; -webkit-font-smoothing:antialiased;
  }
  button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}

  /* ---------------------------------------------------------------- shell */
  .app{display:flex;flex-direction:column;height:100vh}

  .topbar{
    display:flex;align-items:center;gap:16px;height:46px;padding:0 14px;
    border-bottom:1px solid var(--line);background:rgba(21,23,28,.72);
    backdrop-filter:blur(8px);position:relative;z-index:40;flex:none;
  }
  .brand{display:flex;align-items:center;gap:9px;font-weight:600;letter-spacing:.2px}
  .brand .spark{width:16px;height:16px;color:var(--accent)}
  .brand small{color:var(--muted);font-weight:400}

  .modeswitch{display:flex;background:var(--raised);border:1px solid var(--line);border-radius:9px;padding:3px}
  .modeswitch button{padding:5px 13px;border-radius:6px;color:var(--muted);font-size:12px;display:flex;align-items:center;gap:7px}
  .modeswitch button.on{background:var(--panel);color:var(--text);box-shadow:0 1px 0 rgba(255,255,255,.03) inset,0 1px 6px rgba(0,0,0,.4)}
  .modeswitch svg{width:13px;height:13px}

  .topbar .spacer{flex:1}
  .hint{color:var(--faint);font-size:11.5px}
  .hint b{color:var(--muted);font-weight:600}

  .body{position:relative;flex:1;overflow:hidden}

  /* ------------------------------------------------------------- canvas */
  .canvas{position:absolute;inset:0;overflow:hidden;cursor:grab;
    background-image:radial-gradient(circle at 1px 1px, rgba(255,255,255,.035) 1px, transparent 0);
    background-size:26px 26px}
  .canvas.panning{cursor:grabbing}
  .world{position:absolute;top:0;left:0;width:4000px;height:2600px;transform-origin:0 0}
  svg.edges{position:absolute;top:0;left:0;width:4000px;height:2600px;pointer-events:none;overflow:visible}

  /* ------------------------------------------------------- terminal card */
  .card{position:absolute;width:186px;border:1px solid var(--line);border-radius:12px;
    background:linear-gradient(180deg,rgba(27,30,36,.96),rgba(19,21,26,.96));
    box-shadow:0 12px 30px rgba(0,0,0,.45),0 1px 0 rgba(255,255,255,.03) inset;
    user-select:none;transition:box-shadow .18s,border-color .18s,opacity .25s,transform .05s}
  .card .bar{display:flex;align-items:center;gap:8px;height:26px;padding:0 10px;border-bottom:1px solid var(--line);cursor:grab}
  .card .bar:active{cursor:grabbing}
  .lights{display:flex;gap:5px}
  .lights i{width:8px;height:8px;border-radius:50%;background:var(--faint);display:block}
  .lights i.r{background:#E0645C55}.lights i.y{background:#E0B24A55}.lights i.g{background:#4EC98A55}
  .card[data-status="running"] .lights i.g{background:var(--run);box-shadow:0 0 7px var(--run)}
  .card .title{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  .card .body{padding:16px 12px 15px;display:flex;flex-direction:column;align-items:center;gap:8px;position:relative}
  .glyph{width:34px;height:34px;color:var(--rt,#E09A4A);filter:drop-shadow(0 0 8px color-mix(in srgb,var(--rt,#E09A4A) 45%,transparent))}
  .card .name{font-size:13px;font-weight:600;color:var(--text);letter-spacing:.2px}
  .card .role{position:absolute;top:8px;left:10px;font-size:10px;color:var(--faint)}
  .statuschip{font-size:10px;padding:2px 7px;border-radius:999px;border:1px solid var(--line);color:var(--muted)}
  .statuschip.running{color:var(--run);border-color:#2c4d3d}
  .statuschip.working{color:var(--accent);border-color:var(--accent-dim)}
  .statuschip.idle{color:var(--faint)}
  .statuschip.done{color:var(--run);border-color:#2c4d3d}

  .card.sel{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 14px 34px rgba(0,0,0,.55),0 0 24px rgba(224,154,74,.22)}
  .card[data-status="idle"]{opacity:.5;filter:saturate(.5)}
  .card[data-status="working"]{border-color:var(--accent-dim)}
  .card[data-status="working"]::after{content:"";position:absolute;inset:-2px;border-radius:13px;
    border:1px solid var(--accent);opacity:.55;animation:pulse 1.4s ease-in-out infinite;pointer-events:none}
  @keyframes pulse{0%,100%{opacity:.15;transform:scale(1)}50%{opacity:.6;transform:scale(1.012)}}

  .anchor{position:absolute;width:7px;height:7px;border-radius:50%;background:var(--faint);left:50%;translate:-50% 0}
  .anchor.top{top:-4px}.anchor.bot{bottom:-4px}
  .card[data-status="running"] .anchor{background:var(--cable);box-shadow:0 0 6px var(--cable)}

  /* orchestrator = larger */
  .card.orch{width:240px}
  .card.orch .body{padding:22px 14px 20px}
  .card.orch .glyph{width:44px;height:44px}
  .card.orch .name{font-size:15px}

  /* ----------------------------------------------------------- team frame */
  .team{position:absolute;border:1px solid var(--line);border-radius:16px;padding:0;
    background:linear-gradient(180deg,rgba(21,23,28,.55),rgba(14,15,18,.5));
    box-shadow:0 20px 50px rgba(0,0,0,.4);backdrop-filter:blur(3px);transition:opacity .25s,border-color .18s}
  .team.idle{opacity:.55}
  .team.sel{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 20px 50px rgba(0,0,0,.5)}
  .team-bar{display:flex;align-items:center;gap:9px;height:32px;padding:0 12px;border-bottom:1px solid var(--line);cursor:grab}
  .team-bar:active{cursor:grabbing}
  .team-bar .tt{font-size:11px;color:var(--muted)}
  .team-bar .tt b{color:var(--text)}
  .team-bar .grow{flex:1}
  .team-actions{display:flex;gap:4px;opacity:0;transition:opacity .15s}
  .team:hover .team-actions,.team.sel .team-actions{opacity:1}
  .tbtn{width:24px;height:22px;border-radius:6px;border:1px solid var(--line);color:var(--muted);
    display:grid;place-items:center;background:var(--raised)}
  .tbtn:hover{color:var(--text);border-color:var(--faint)}
  .tbtn.danger:hover{color:var(--del);border-color:#5a2f2c}
  .tbtn svg{width:13px;height:13px}
  .team-members{display:flex;gap:14px;padding:16px}
  /* cards inside a team switch to static flow layout */
  .team-members .card{position:relative;width:158px}

  /* ------------------------------------------------------------- inspector */
  .inspector{position:absolute;top:14px;right:14px;width:290px;max-height:calc(100% - 28px);
    background:rgba(21,23,28,.94);border:1px solid var(--line);border-radius:14px;
    box-shadow:0 20px 50px rgba(0,0,0,.5);backdrop-filter:blur(10px);z-index:30;
    display:flex;flex-direction:column;overflow:hidden;transition:transform .25s,opacity .2s}
  .inspector.hidden{transform:translateX(20px);opacity:0;pointer-events:none}
  .insp-head{display:flex;align-items:center;gap:11px;padding:14px 14px 12px;border-bottom:1px solid var(--line)}
  .insp-head .glyph{width:30px;height:30px;flex:none}
  .insp-head .t{flex:1;min-width:0}
  .insp-head .t h3{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .insp-head .t p{font-size:11px;color:var(--muted)}
  .insp-close{width:24px;height:24px;border-radius:6px;color:var(--muted)}
  .insp-close:hover{color:var(--text);background:var(--raised)}
  .insp-body{padding:12px 14px;overflow:auto}
  .kv{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px dashed var(--line);font-size:12px}
  .kv:last-of-type{border-bottom:none}
  .kv span:first-child{color:var(--muted)}
  .insp-actions{display:flex;flex-direction:column;gap:8px;padding:12px 14px 14px;border-top:1px solid var(--line)}
  .act{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:9px;border:1px solid var(--line);
    background:var(--raised);color:var(--text);font-size:12.5px;text-align:left}
  .act:hover{border-color:var(--faint)}
  .act.primary{background:var(--accent);color:var(--accent-contrast);border-color:var(--accent);font-weight:600}
  .act.primary:hover{filter:brightness(1.06)}
  .act.danger{color:var(--del)}
  .act.danger:hover{border-color:#5a2f2c;background:#231a1a}
  .act svg{width:14px;height:14px;flex:none}

  .rt-pick{display:flex;flex-wrap:wrap;gap:6px;margin:2px 0 4px}
  .rt-pick button{display:flex;align-items:center;gap:6px;padding:6px 9px;border-radius:8px;border:1px solid var(--line);background:var(--raised);color:var(--muted);font-size:11.5px}
  .rt-pick button svg{width:14px;height:14px;color:var(--rc)}
  .rt-pick button.on{color:var(--text);border-color:var(--faint);background:var(--panel)}

  /* --------------------------------------------------------------- dock */
  .dock{position:absolute;left:50%;bottom:16px;translate:-50% 0;display:flex;gap:8px;
    background:rgba(21,23,28,.9);border:1px solid var(--line);border-radius:12px;padding:8px;z-index:30;
    box-shadow:0 16px 40px rgba(0,0,0,.5);backdrop-filter:blur(10px)}
  .dbtn{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:9px;border:1px solid transparent;color:var(--muted);font-size:12px}
  .dbtn:hover{color:var(--text);background:var(--raised)}
  .dbtn.accent{color:var(--accent-contrast);background:var(--accent);font-weight:600}
  .dbtn.accent:hover{filter:brightness(1.06)}
  .dbtn svg{width:15px;height:15px}
  .dock .sep{width:1px;background:var(--line);margin:2px 2px}

  .zoomctl{position:absolute;left:16px;bottom:16px;display:flex;flex-direction:column;
    background:rgba(21,23,28,.9);border:1px solid var(--line);border-radius:10px;overflow:hidden;z-index:30}
  .zoomctl button{width:34px;height:32px;color:var(--muted);display:grid;place-items:center;border-bottom:1px solid var(--line)}
  .zoomctl button:last-child{border-bottom:none}
  .zoomctl button:hover{color:var(--text);background:var(--raised)}

  /* terminals-mode placeholder */
  .terminals{position:absolute;inset:0;display:none;padding:16px;gap:12px;grid-template-columns:repeat(3,1fr);grid-auto-rows:1fr}
  body.mode-terminals .canvas,body.mode-terminals .inspector,body.mode-terminals .dock,body.mode-terminals .zoomctl{display:none}
  body.mode-terminals .terminals{display:grid}
  .term{border:1px solid var(--line);border-radius:12px;background:linear-gradient(180deg,rgba(19,21,26,.96),rgba(14,15,18,.96));overflow:hidden;display:flex;flex-direction:column}
  .term .bar{display:flex;align-items:center;gap:8px;height:30px;padding:0 12px;border-bottom:1px solid var(--line);color:var(--muted);font-size:11px}
  .term pre{flex:1;margin:0;padding:12px;font-size:11.5px;color:#9aa2ad;overflow:auto;white-space:pre-wrap}
  .term pre b{color:var(--run)}.term pre .c{color:var(--accent)}.term pre .m{color:var(--muted)}

  .toast{position:absolute;left:50%;bottom:78px;translate:-50% 0;background:var(--raised);border:1px solid var(--line);
    color:var(--text);font-size:12px;padding:8px 14px;border-radius:9px;z-index:50;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none}
  .toast.show{opacity:1;transform:translateY(-4px)}

  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body class="mode-graph">
<div class="app">
  <div class="topbar">
    <div class="brand">
      <span class="spark" data-glyph="claude"></span>
      ADE <small>· agentic development environment</small>
    </div>
    <div class="modeswitch" id="modeswitch">
      <button data-mode="terminals"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M7 9l3 3-3 3M13 15h4"/></svg>Terminals</button>
      <button data-mode="graph" class="on"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="2.4"/><circle cx="5" cy="18" r="2.4"/><circle cx="19" cy="18" r="2.4"/><path d="M12 7.4v4M10.5 13l-4 3M13.5 13l4 3"/></svg>Graph</button>
    </div>
    <div class="spacer"></div>
    <div class="hint"><b>Drag</b> Kacheln &amp; Hintergrund · <b>Scroll</b> Zoom · <b>Klick</b> wählt einen Agenten</div>
  </div>

  <div class="body">
    <!-- graph canvas -->
    <div class="canvas" id="canvas">
      <div class="world" id="world">
        <svg class="edges" id="edges"></svg>
        <!-- nodes injected by JS -->
      </div>
    </div>

    <!-- terminals mode placeholder -->
    <div class="terminals" id="terminals"></div>

    <!-- inspector -->
    <aside class="inspector hidden" id="inspector"></aside>

    <!-- zoom -->
    <div class="zoomctl">
      <button id="zin" title="Zoom in">＋</button>
      <button id="zout" title="Zoom out">－</button>
      <button id="zfit" title="Fit / reset">⤢</button>
    </div>

    <!-- action dock -->
    <div class="dock" id="dock">
      <button class="dbtn accent" id="spawn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>Team spawnen</button>
      <div class="sep"></div>
      <button class="dbtn" id="dispatch"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12h13M13 6l6 6-6 6"/></svg>Runde verteilen</button>
      <button class="dbtn" id="idleall"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="8"/><path d="M9 12h6"/></svg>Alle idle</button>
      <button class="dbtn" id="resumeall"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6l10 6-10 6z"/></svg>Alle aktiv</button>
    </div>

    <div class="toast" id="toast"></div>
  </div>
</div>

<script>
/* ============================ runtime identities ============================ */
const G = {
  claude:'<svg viewBox="0 0 24 24"><g stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M12 2v20M2 12h20M4.9 4.9l14.2 14.2M19.1 4.9L4.9 19.1"/><path d="M12 6l1.4 4.6L18 12l-4.6 1.4L12 18l-1.4-4.6L6 12l4.6-1.4z" fill="currentColor" stroke="none"/></g></svg>',
  codex:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="9"/><path d="M12 4a8 8 0 0 1 0 16 5 5 0 0 1 0-10 2.5 2.5 0 0 1 0 5"/></svg>',
  hermes:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 3v18"/><circle cx="12" cy="6" r="2"/><path d="M7 8c1.5 2 3 3 5 3s3.5-1 5-3M8 21c0-4 1.6-7 4-9M16 21c0-4-1.6-7-4-9"/></svg>',
  grok:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18M12 3v3M12 18v3M3 12h3M18 12h3"/></svg>',
  opencode:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6L3 12l6 6M15 6l6 6-6 6"/></svg>',
  gemini:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2c.6 5.4 4.6 9.4 10 10-5.4.6-9.4 4.6-10 10-.6-5.4-4.6-9.4-10-10 5.4-.6 9.4-4.6 10-10z"/></svg>',
  pi:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 8h14M9 8v9M15 8v7c0 1.2.8 2 2 2"/></svg>'
};
const RT = {
  claude:{label:'Claude Code', short:'Claude', color:'#E09A4A'},
  codex:{label:'Codex', short:'Codex', color:'#7BC9A0'},
  hermes:{label:'Hermes', short:'Hermes', color:'#B99BD6'},
  grok:{label:'Grok Build', short:'Grok', color:'#7BA9C9'},
  opencode:{label:'OpenCode', short:'OpenCode', color:'#D6C05A'},
  gemini:{label:'Gemini', short:'Gemini', color:'#C98A7B'},
};
const RT_KEYS = Object.keys(RT);
const TEAM_NAMES = ['frontend','platform','backend','infra','research','data','mobile','payments','growth'];

/* glyph helper: color-aware */
function glyphSVG(rt){ return G[rt] || G.pi; }

/* ================================ state ================================ */
let uid = 1; const nid = p => p+(uid++);
const state = {
  orch:{ id:'orch', runtime:'claude', name:'Claude', status:'running', x:1620, y:120 },
  teams:[]
};
function makeTeam(runtime, name, workerCount, x, y){
  const t = { id:nid('t'), name, runtime, status:'running', x, y,
    lead:{ id:nid('l'), runtime, name:RT[runtime].short, status:'running' },
    workers:[] };
  for(let i=0;i<workerCount;i++) t.workers.push({ id:nid('w'), runtime, name:RT[runtime].short, status:'running' });
  return t;
}
/* seed exactly per Auftrag: Codex(2), Hermes(3), Claude Code(4) */
state.teams.push(makeTeam('codex','frontend',2, 0, 560));
state.teams.push(makeTeam('hermes','platform',3, 0, 560));
state.teams.push(makeTeam('claude','backend',4, 0, 560));

/* analytic team width from member count (card 158 + gap 14, padding 16*2) */
function teamWidth(t){ const n=1+t.workers.length; return 32 + n*158 + (n-1)*14; }
/* tidy teams left→right, recentre orchestrator above them */
function reflowTeams(){
  let x=160; const y=560, gap=68;
  for(const t of state.teams){ t.x=x; t.y=y; x += teamWidth(t)+gap; }
  if(state.teams.length){
    const first=state.teams[0], last=state.teams[state.teams.length-1];
    state.orch.x=(first.x + last.x + teamWidth(last))/2 - 120;
    state.orch.y=120;
  }
}
reflowTeams();

/* ================================ view ================================ */
const world = document.getElementById('world');
const edges = document.getElementById('edges');
const canvas = document.getElementById('canvas');
let scale=0.8, panX=0, panY=0;
let selection=null; // {kind:'orch'|'lead'|'worker'|'team', id, teamId}

function applyTransform(){ world.style.transform=`translate(${panX}px,${panY}px) scale(${scale})`; }

function cardHTML(node, role, cls=''){
  const rt=RT[node.runtime];
  return `<div class="card ${cls}" data-node="${node.id}" data-status="${node.status}" style="--rt:${rt.color}">
    <div class="bar" data-drag="${cls.includes('orch')?'orch':''}">
      <div class="lights"><i class="r"></i><i class="y"></i><i class="g"></i></div>
      <div class="title">${cls.includes('orch')?'ade · orchestrator':'~ '+role}</div>
    </div>
    <div class="body">
      ${role?`<div class="role">~ ${role}</div>`:''}
      <div class="glyph">${glyphSVG(node.runtime)}</div>
      <div class="name">${node.name}</div>
      <div class="statuschip ${node.status}">${node.status}</div>
    </div>
    <i class="anchor top" data-anchor="${node.id}:top"></i>
    <i class="anchor bot" data-anchor="${node.id}:bot"></i>
  </div>`;
}

function render(){
  // remove existing nodes (keep svg)
  world.querySelectorAll('.card,.team').forEach(n=>n.remove());

  // orchestrator
  const o=document.createElement('div');
  o.innerHTML=cardHTML(state.orch,'','orch');
  const oc=o.firstElementChild; oc.style.left=state.orch.x+'px'; oc.style.top=state.orch.y+'px';
  oc.dataset.kind='orch'; world.appendChild(oc);

  // teams
  for(const t of state.teams){
    const el=document.createElement('div');
    el.className='team'+(t.status==='idle'?' idle':'');
    el.dataset.team=t.id; el.style.left=t.x+'px'; el.style.top=t.y+'px';
    el.innerHTML=`
      <div class="team-bar" data-dragteam="${t.id}">
        <div class="lights"><i class="r"></i><i class="y"></i><i class="g"></i></div>
        <div class="tt">team · <b>${t.name}</b></div>
        <div class="grow"></div>
        <div class="team-actions">
          <button class="tbtn" data-act="addworker" data-team="${t.id}" title="Worker hinzufügen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg></button>
          <button class="tbtn" data-act="toggleidle" data-team="${t.id}" title="Idle / Aktiv"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="8"/><path d="M9 12h6"/></svg></button>
          <button class="tbtn danger" data-act="dissolve" data-team="${t.id}" title="Team auflösen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 7h12M9 7V5h6v2M10 11v6M14 11v6M5 7l1 13h12l1-13"/></svg></button>
        </div>
      </div>
      <div class="team-members"></div>`;
    const wrap=el.querySelector('.team-members');
    // lead
    const lc=document.createElement('div'); lc.innerHTML=cardHTML(t.lead,'lead');
    const lce=lc.firstElementChild; lce.dataset.kind='lead'; lce.dataset.team=t.id; wrap.appendChild(lce);
    // workers
    for(const w of t.workers){
      const wc=document.createElement('div'); wc.innerHTML=cardHTML(w,'worker');
      const wce=wc.firstElementChild; wce.dataset.kind='worker'; wce.dataset.team=t.id; wrap.appendChild(wce);
    }
    world.appendChild(el);
  }
  applySelection();
  requestAnimationFrame(drawEdges);
}

/* ------------------------------------------------------------ edges ---- */
function anchorPt(id, side){
  const el=world.querySelector(`[data-anchor="${id}:${side}"]`);
  if(!el) return null;
  const wr=world.getBoundingClientRect();
  const r=el.getBoundingClientRect();
  return { x:(r.left+r.width/2-wr.left)/scale, y:(r.top+r.height/2-wr.top)/scale };
}
function path(a,b){ const dy=Math.max(46,(b.y-a.y)/2); return `M${a.x},${a.y} C${a.x},${a.y+dy} ${b.x},${b.y-dy} ${b.x},${b.y}`; }

const edgeEls={};
function drawEdges(){
  edges.innerHTML='';
  for(const k in edgeEls) delete edgeEls[k];
  const oBot=anchorPt('orch','bot'); if(!oBot) return;
  for(const t of state.teams){
    const leadTop=anchorPt(t.lead.id,'top');
    if(leadTop){
      const active=t.status!=='idle';
      addEdge('e_'+t.id, oBot, leadTop, active?'cable':'faint', active?3.4:2, active);
    }
    const leadBot=anchorPt(t.lead.id,'bot');
    for(const w of t.workers){
      const wTop=anchorPt(w.id,'top');
      if(leadBot&&wTop){
        const active=t.status!=='idle'&&w.status!=='idle';
        addEdge('e_'+w.id, leadBot, wTop, active?'accent':'faint', active?2.2:1.6, active);
      }
    }
  }
}
function addEdge(id,a,b,kind,w,active){
  const col=kind==='cable'?'var(--cable)':kind==='accent'?'var(--accent)':'var(--faint)';
  const p=document.createElementNS('http://www.w3.org/2000/svg','path');
  p.setAttribute('d',path(a,b)); p.setAttribute('fill','none');
  p.setAttribute('stroke',col); p.setAttribute('stroke-width',w);
  p.setAttribute('stroke-linecap','round'); p.setAttribute('opacity',active?'0.9':'0.35');
  if(kind==='cable'&&active) p.setAttribute('filter','drop-shadow(0 0 6px rgba(78,201,138,.55))');
  edges.appendChild(p); edgeEls[id]=p;
  if(active){ // faint ambient flow
    const f=document.createElementNS('http://www.w3.org/2000/svg','path');
    f.setAttribute('d',path(a,b)); f.setAttribute('fill','none'); f.setAttribute('stroke',col);
    f.setAttribute('stroke-width',w*0.6); f.setAttribute('stroke-linecap','round');
    f.setAttribute('stroke-dasharray','2 16'); f.setAttribute('opacity','0.5');
    const anim=document.createElementNS('http://www.w3.org/2000/svg','animate');
    anim.setAttribute('attributeName','stroke-dashoffset'); anim.setAttribute('from','0'); anim.setAttribute('to','-36');
    anim.setAttribute('dur','1.4s'); anim.setAttribute('repeatCount','indefinite'); f.appendChild(anim);
    edges.appendChild(f);
  }
}

/* travel dot for task dispatch/report */
function travel(edgeId, color, dur, cb){
  const p=edgeEls[edgeId]; if(!p){ cb&&cb(); return; }
  if(matchMedia('(prefers-reduced-motion:reduce)').matches){ cb&&cb(); return; }
  const len=p.getTotalLength();
  const dot=document.createElementNS('http://www.w3.org/2000/svg','circle');
  dot.setAttribute('r','4.5'); dot.setAttribute('fill',color);
  dot.setAttribute('filter',`drop-shadow(0 0 6px ${color})`); edges.appendChild(dot);
  let start=null;
  function step(ts){ if(start===null)start=ts; const t=Math.min(1,(ts-start)/dur);
    const pt=p.getPointAtLength(t*len); dot.setAttribute('cx',pt.x); dot.setAttribute('cy',pt.y);
    if(t<1) requestAnimationFrame(step); else { dot.remove(); cb&&cb(); } }
  requestAnimationFrame(step);
}

/* ============================ interactions ============================ */
// pan
let pan=null;
canvas.addEventListener('pointerdown',e=>{
  if(e.target.closest('.card')||e.target.closest('.team-bar')) return;
  if(e.target.closest('.team')&&!e.target.closest('.team-bar')&&e.target.closest('.card')) return;
  select(null);
  pan={sx:e.clientX,sy:e.clientY,px:panX,py:panY}; canvas.classList.add('panning'); canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener('pointermove',e=>{
  if(!pan) return; panX=pan.px+(e.clientX-pan.sx); panY=pan.py+(e.clientY-pan.sy); applyTransform();
});
canvas.addEventListener('pointerup',e=>{ pan=null; canvas.classList.remove('panning'); });
// zoom
canvas.addEventListener('wheel',e=>{
  e.preventDefault(); const old=scale; scale=Math.min(1.6,Math.max(0.4,scale*(e.deltaY<0?1.1:0.9)));
  const rect=canvas.getBoundingClientRect(); const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  panX=mx-(mx-panX)*(scale/old); panY=my-(my-panY)*(scale/old); applyTransform();
},{passive:false});

// node drag (orchestrator + team frames)
let drag=null;
world.addEventListener('pointerdown',e=>{
  const orchBar=e.target.closest('.bar[data-drag="orch"]');
  const teamBar=e.target.closest('[data-dragteam]');
  if(orchBar){ drag={kind:'orch'}; }
  else if(teamBar){ const t=state.teams.find(x=>x.id===teamBar.dataset.dragteam); drag={kind:'team',t}; }
  else return;
  drag.sx=e.clientX; drag.sy=e.clientY;
  drag.ox=drag.kind==='orch'?state.orch.x:drag.t.x; drag.oy=drag.kind==='orch'?state.orch.y:drag.t.y;
  world.setPointerCapture(e.pointerId); e.stopPropagation();
});
world.addEventListener('pointermove',e=>{
  if(!drag) return; const dx=(e.clientX-drag.sx)/scale, dy=(e.clientY-drag.sy)/scale;
  if(drag.kind==='orch'){ state.orch.x=drag.ox+dx; state.orch.y=drag.oy+dy;
    const el=world.querySelector('.card.orch'); el.style.left=state.orch.x+'px'; el.style.top=state.orch.y+'px'; }
  else { drag.t.x=drag.ox+dx; drag.t.y=drag.oy+dy;
    const el=world.querySelector(`[data-team="${drag.t.id}"].team`); el.style.left=drag.t.x+'px'; el.style.top=drag.t.y+'px'; }
  drawEdges();
});
world.addEventListener('pointerup',()=>{ drag=null; });

// selection click
world.addEventListener('click',e=>{
  const act=e.target.closest('[data-act]');
  if(act){ handleTeamAction(act.dataset.act, act.dataset.team); e.stopPropagation(); return; }
  const card=e.target.closest('.card');
  if(card){ selectNode(card); return; }
  const teamBar=e.target.closest('.team-bar');
  if(teamBar){ const t=teamBar.closest('.team'); select({kind:'team',id:t.dataset.team}); }
});

function selectNode(card){
  const kind=card.dataset.kind, id=card.dataset.node, teamId=card.dataset.team;
  select({kind,id,teamId});
}
function select(sel){ selection=sel; applySelection(); renderInspector(); }
function applySelection(){
  world.querySelectorAll('.card.sel,.team.sel').forEach(n=>n.classList.remove('sel'));
  if(!selection) return;
  if(selection.kind==='team'){ const t=world.querySelector(`[data-team="${selection.id}"].team`); t&&t.classList.add('sel'); }
  else { const c=world.querySelector(`.card[data-node="${selection.id}"]`); c&&c.classList.add('sel'); }
}

/* --------------------------------------------------------- inspector --- */
const inspector=document.getElementById('inspector');
function findTeam(id){ return state.teams.find(t=>t.id===id); }
function nodeOf(sel){
  if(sel.kind==='orch') return state.orch;
  const t=findTeam(sel.teamId);
  if(!t) return null;
  if(sel.kind==='lead') return t.lead;
  return t.workers.find(w=>w.id===sel.id);
}
function renderInspector(){
  if(!selection){ inspector.classList.add('hidden'); return; }
  inspector.classList.remove('hidden');
  if(selection.kind==='team'){ return renderTeamInspector(findTeam(selection.id)); }
  const n=nodeOf(selection); if(!n){ inspector.classList.add('hidden'); return; }
  const rt=RT[n.runtime];
  const title = selection.kind==='orch'?'Orchestrator':selection.kind==='lead'?'Teamleader':'Worker';
  const t = selection.teamId?findTeam(selection.teamId):null;
  let actions='';
  if(selection.kind==='orch'){
    actions=`
      ${rtPicker('spawnrt', pendingSpawnRt)}
      <button class="act primary" data-i="spawn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>Neues Team spawnen</button>
      <button class="act" data-i="dispatchall"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12h13M13 6l6 6-6 6"/></svg>Task-Runde an alle Teams</button>
      <button class="act" data-i="idleall"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="8"/><path d="M9 12h6"/></svg>Alle Teams idle schalten</button>`;
  } else if(selection.kind==='lead'){
    actions=`
      <button class="act primary" data-i="assignteam"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12h13M13 6l6 6-6 6"/></svg>Task ans Team verteilen</button>
      <button class="act" data-i="addworker"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>Worker hinzufügen</button>
      <button class="act" data-i="toggleidle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="8"/><path d="M9 12h6"/></svg>${t&&t.status==='idle'?'Team reaktivieren':'Team idle schalten'}</button>
      <button class="act danger" data-i="dissolve"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 7h12M9 7V5h6v2M10 11v6M14 11v6M5 7l1 13h12l1-13"/></svg>Team auflösen</button>`;
  } else {
    actions=`
      <button class="act primary" data-i="assignworker"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12h13M13 6l6 6-6 6"/></svg>Task zuweisen</button>
      <button class="act" data-i="toggleworker"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="8"/><path d="M9 12h6"/></svg>${n.status==='idle'?'Reaktivieren':'Idle schalten'}</button>
      <button class="act danger" data-i="removeworker"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 7h12M9 7V5h6v2M10 11v6M14 11v6M5 7l1 13h12l1-13"/></svg>Worker entfernen</button>`;
  }
  inspector.innerHTML=`
    <div class="insp-head">
      <div class="glyph" style="--rt:${rt.color}">${glyphSVG(n.runtime)}</div>
      <div class="t"><h3>${n.name}</h3><p>${title}${t?' · team '+t.name:''}</p></div>
      <button class="insp-close" data-i="close">✕</button>
    </div>
    <div class="insp-body">
      <div class="kv"><span>Runtime</span><span>${rt.label}</span></div>
      <div class="kv"><span>Status</span><span style="color:${statusColor(n.status)}">${n.status}</span></div>
      <div class="kv"><span>Rolle</span><span>${title}</span></div>
      ${t?`<div class="kv"><span>Team</span><span>${t.name} · ${t.workers.length} worker</span></div>`:''}
      ${selection.kind==='orch'?`<div class="kv"><span>Teams</span><span>${state.teams.length} aktiv</span></div>`:''}
    </div>
    <div class="insp-actions">${actions}</div>`;
}
function renderTeamInspector(t){
  if(!t){ inspector.classList.add('hidden'); return; }
  const rt=RT[t.runtime];
  inspector.innerHTML=`
    <div class="insp-head">
      <div class="glyph" style="--rt:${rt.color}">${glyphSVG(t.runtime)}</div>
      <div class="t"><h3>team · ${t.name}</h3><p>${rt.label} lead · ${t.workers.length} worker</p></div>
      <button class="insp-close" data-i="close">✕</button>
    </div>
    <div class="insp-body">
      <div class="kv"><span>Status</span><span style="color:${statusColor(t.status)}">${t.status}</span></div>
      <div class="kv"><span>Teamleader</span><span>${t.lead.name}</span></div>
      <div class="kv"><span>Worker</span><span>${t.workers.length}</span></div>
    </div>
    <div class="insp-actions">
      <button class="act primary" data-i="assignteam"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12h13M13 6l6 6-6 6"/></svg>Task ans Team verteilen</button>
      <button class="act" data-i="addworker"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>Worker hinzufügen</button>
      <button class="act" data-i="toggleidle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="8"/><path d="M9 12h6"/></svg>${t.status==='idle'?'Team reaktivieren':'Team idle schalten'}</button>
      <button class="act danger" data-i="dissolve"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 7h12M9 7V5h6v2M10 11v6M14 11v6M5 7l1 13h12l1-13"/></svg>Team auflösen</button>
    </div>`;
  selection={kind:'team',id:t.id};
}
function statusColor(s){ return s==='running'?'var(--run)':s==='working'?'var(--accent)':s==='done'?'var(--run)':'var(--faint)'; }

let pendingSpawnRt='grok';
function rtPicker(id, current){
  return `<div class="rt-pick" data-picker="${id}">`+RT_KEYS.map(k=>
    `<button data-rt="${k}" class="${k===current?'on':''}" style="--rc:${RT[k].color}">${glyphSVG(k)}${RT[k].short}</button>`).join('')+`</div>`;
}

// inspector clicks
inspector.addEventListener('click',e=>{
  const pick=e.target.closest('[data-rt]');
  if(pick){ pendingSpawnRt=pick.dataset.rt; renderInspector(); return; }
  const b=e.target.closest('[data-i]'); if(!b) return;
  const cmd=b.dataset.i, sel=selection;
  switch(cmd){
    case 'close': select(null); break;
    case 'spawn': spawnTeam(pendingSpawnRt); break;
    case 'dispatchall': dispatchAll(); break;
    case 'idleall': idleAll(true); break;
    case 'assignteam': assignTeam(sel.kind==='team'?sel.id:sel.teamId); break;
    case 'addworker': addWorker(sel.kind==='team'?sel.id:sel.teamId); break;
    case 'toggleidle': toggleTeamIdle(sel.kind==='team'?sel.id:sel.teamId); break;
    case 'dissolve': dissolveTeam(sel.kind==='team'?sel.id:sel.teamId); break;
    case 'assignworker': assignWorker(sel.teamId, sel.id); break;
    case 'toggleworker': toggleWorker(sel.teamId, sel.id); break;
    case 'removeworker': removeWorker(sel.teamId, sel.id); break;
  }
});

/* ---------------------------------------------------------- team actions */
function handleTeamAction(act, teamId){
  if(act==='addworker') addWorker(teamId);
  else if(act==='toggleidle') toggleTeamIdle(teamId);
  else if(act==='dissolve') dissolveTeam(teamId);
}

function spawnTeam(runtime){
  const used=new Set(state.teams.map(t=>t.name));
  const name=TEAM_NAMES.find(n=>!used.has(n))||('team'+(state.teams.length+1));
  const t=makeTeam(runtime,name, 2, 0, 560);
  state.teams.push(t); reflowTeams(); render(); fitView();
  toast(`Team „${name}" gespawnt · ${RT[runtime].label} lead`);
  select({kind:'team',id:t.id});
}
function assignTeam(teamId){
  const t=findTeam(teamId); if(!t||t.status==='idle') return toast('Team ist idle');
  toast(`Orchestrator → ${t.name}: Task verteilt`);
  travel('e_'+teamId,'#E09A4A',700,()=>{
    t.workers.forEach((w,i)=> setTimeout(()=>assignWorker(teamId,w.id,true), i*140));
  });
}
function assignWorker(teamId, workerId, quiet){
  const t=findTeam(teamId); if(!t) return; const w=t.workers.find(x=>x.id===workerId); if(!w) return;
  if(w.status==='idle') return;
  setStatus(w,'working');
  if(!quiet) toast(`${t.lead.name} → worker: Task zugewiesen`);
  travel('e_'+workerId,'#E09A4A',600,()=>{
    setTimeout(()=>{ // worker meldet zurück
      setStatus(w,'done');
      travel('e_'+workerId,'#4EC98A',600,()=>{
        // teamleader meldet an orchestrator
        travel('e_'+teamId,'#4EC98A',600);
        setTimeout(()=>setStatus(w,'running'),700);
      });
    }, 900+Math.random()*600);
  });
}
function addWorker(teamId){
  const t=findTeam(teamId); if(!t) return;
  t.workers.push({ id:nid('w'), runtime:t.runtime, name:RT[t.runtime].short, status:t.status==='idle'?'idle':'running' });
  reflowTeams(); render(); fitView(); toast(`Worker zu „${t.name}" hinzugefügt (${t.workers.length})`);
  if(selection&&selection.kind==='team') select({kind:'team',id:teamId});
}
function removeWorker(teamId, workerId){
  const t=findTeam(teamId); if(!t) return;
  t.workers=t.workers.filter(w=>w.id!==workerId); reflowTeams(); render(); select(null);
  toast('Worker entfernt');
}
function toggleWorker(teamId, workerId){
  const t=findTeam(teamId); const w=t.workers.find(x=>x.id===workerId); if(!w) return;
  w.status = w.status==='idle'?'running':'idle'; render();
  select({kind:'worker',id:workerId,teamId});
}
function toggleTeamIdle(teamId){
  const t=findTeam(teamId); if(!t) return;
  const idle = t.status!=='idle';
  t.status = idle?'idle':'running';
  t.lead.status = idle?'idle':'running';
  t.workers.forEach(w=> w.status = idle?'idle':'running');
  render(); toast(`Team „${t.name}" ${idle?'auf idle':'reaktiviert'}`);
  if(selection){ if(selection.kind==='team') select({kind:'team',id:teamId}); else renderInspector(); }
}
function dissolveTeam(teamId){
  const t=findTeam(teamId); if(!t) return;
  state.teams=state.teams.filter(x=>x.id!==teamId); reflowTeams(); select(null); render(); fitView();
  toast(`Team „${t.name}" aufgelöst`);
}
function dispatchAll(){
  toast('Orchestrator verteilt eine Task-Runde an alle Teams');
  state.teams.forEach((t,i)=> setTimeout(()=>{ if(t.status!=='idle') assignTeam(t.id); }, i*220));
}
function idleAll(v){
  state.teams.forEach(t=>{ t.status=v?'idle':'running'; t.lead.status=t.status; t.workers.forEach(w=>w.status=t.status); });
  render(); toast(v?'Alle Teams auf idle':'Alle Teams reaktiviert');
}
function setStatus(node,s){
  node.status=s;
  const card=world.querySelector(`.card[data-node="${node.id}"]`);
  if(card){ card.dataset.status=s; const chip=card.querySelector('.statuschip'); if(chip){ chip.className='statuschip '+s; chip.textContent=s; } }
  drawEdges();
}

/* -------------------------------------------------------------- dock --- */
document.getElementById('spawn').onclick=()=>spawnTeam(pendingSpawnRt);
document.getElementById('dispatch').onclick=dispatchAll;
document.getElementById('idleall').onclick=()=>idleAll(true);
document.getElementById('resumeall').onclick=()=>idleAll(false);
document.getElementById('zin').onclick=()=>zoomBy(1.15);
document.getElementById('zout').onclick=()=>zoomBy(0.87);
document.getElementById('zfit').onclick=fitView;
function fitView(){
  if(!state.teams.length){ scale=0.8;panX=40;panY=0;applyTransform();drawEdges();return; }
  const first=state.teams[0], last=state.teams[state.teams.length-1];
  const left=Math.min(first.x, state.orch.x), right=Math.max(last.x+teamWidth(last), state.orch.x+240);
  const top=state.orch.y, bottom=560+240;
  const rect=canvas.getBoundingClientRect();
  const pad=90;
  scale=Math.min(1.2, Math.max(0.42,
    Math.min((rect.width-pad*2)/(right-left), (rect.height-pad*2-70)/(bottom-top))));
  panX=(rect.width-(right-left)*scale)/2 - left*scale;
  panY=pad - top*scale;
  applyTransform(); drawEdges();
}
function zoomBy(f){ const old=scale; scale=Math.min(1.6,Math.max(0.4,scale*f));
  const rect=canvas.getBoundingClientRect(); const mx=rect.width/2,my=rect.height/2;
  panX=mx-(mx-panX)*(scale/old); panY=my-(my-panY)*(scale/old); applyTransform(); drawEdges(); }
